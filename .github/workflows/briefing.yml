name: Briefing diário Telegram

on:
  schedule:
    # 09:00 UTC = 06:00 no horário de Brasília (UTC-3). Ajuste se quiser outro horário.
    - cron: '0 9 * * *'
  workflow_dispatch:   # permite disparar manualmente pelo botão "Run workflow"

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar a Edge Function do briefing
        run: |
          curl -sS -X GET \
            "https://bweblwmgwutzdvqtpbww.supabase.co/functions/v1/briefing-telegram?key=${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
