name: Briefing diário Telegram

on:
  schedule:
    # roda no minuto 0 de CADA hora; a Edge Function decide se é a hora certa
    # (o horário fica configurável no app, aba Usuários)
    - cron: '0 * * * *'
  workflow_dispatch:   # botão de disparo manual (envia na hora, ignora a checagem)

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar a Edge Function do briefing
        run: |
          # no disparo manual força o envio; no agendado deixa a função checar a hora
          FORCE=0
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then FORCE=1; fi
          curl -sS -X GET \
            "https://bweblwmgwutzdvqtpbww.supabase.co/functions/v1/briefing-telegram?key=${{ secrets.CRON_SECRET }}&force=${FORCE}" \
            -w "\nHTTP %{http_code}\n"
